services:
  - type: web
    name: kuukutopia
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn kuukutopia.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: kuukutopia.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: kuukutopia-db
          property: connectionString

databases:
  - name: kuukutopia-db
    databaseName: kuukutopia
    user: kuukutopia
